name: Checks

on:
  pull_request:
  merge_group:

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install prek
      - run: prek run --all-files --show-diff-on-failure --color always

  tropes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check_tropes.sh
